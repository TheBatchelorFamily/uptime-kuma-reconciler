{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "uptime-kuma-reconciler.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "uptime-kuma-reconciler.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.credentials.username | quote }}
  password: {{ .Values.credentials.password | quote }}
{{- end }}
